<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Generic Fishing Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
            background: #000;
            touch-action: none;
            image-rendering: optimizeSpeed;
            -webkit-interpolation-mode: nearest-neighbor;
            aspect-ratio: 960 / 540;
        }
    </style>
</head>
<body>
    <div id="gm4html5_div_id">
        <canvas id="canvas" width="960" height="540">
            <p>Your browser doesn't support HTML5 canvas.</p>
        </canvas>
    </div>

    <script src="html5game/GenericFishing.js"></script>
    <script>
        function startGame() {
            if (typeof GameMaker_Init === 'function') {
                GameMaker_Init();
            }
        }

        function unlockAudio() {
            console.log('Audio unlocked');
        }

        // Start game on load
        window.addEventListener('load', startGame);

        // Unlock audio on any user interaction
        document.addEventListener('click', unlockAudio, { once: true });
        document.addEventListener('touchstart', unlockAudio, { once: true });
        document.addEventListener('keydown', unlockAudio, { once: true });

        // Fallback: auto-click after 100ms
        setTimeout(() => document.body.click(), 100);
    </script>
</body>
</html>
